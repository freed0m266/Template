opt_in_rules:
  - class_delegate_protocol
  - cyclomatic_complexity
  - empty_enum_arguments
  - file_length
  - force_cast
  - force_unwrapping
  - function_body_length
  - custom_rules
  - weak_delegate
  - overridden_super_call
  - pattern_matching_keywords
  - superfluous_disable_command

disabled_rules:
  - identifier_name
  - file_length
  - trailing_whitespace

included:
  - Template
  - TemplateCore
  - TemplateUI
  - TemplateResources
  - Features

excluded:
  - Tuist
  - Derived

force_cast: warning
